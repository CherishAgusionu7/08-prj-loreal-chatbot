<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oreal Beauty Assistant</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img class="brand-logo" src="img/loreal-logo.png" alt="L'Oreal logo" />
        <p class="eyebrow">AI BEAUTY CONSULTATION</p>
        <h1 class="site-title">L'Oreal Beauty Assistant</h1>
        <p class="site-subtitle">
          Personalized beauty recommendations for skincare, haircare, makeup,
          and fragrance.
        </p>
        <div class="header-divider" aria-hidden="true"></div>
      </header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div id="chatWindow" class="chat-window" aria-live="polite">
            <!-- messages will be appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about L'Oreal products or beauty routines..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn" aria-label="Send message">
              Send
            </button>
          </form>
        </section>
      </main>

      <!------- Footer ------->
      <footer class="site-footer">
        <p>Powered by AI - L'Oreal product guidance</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
